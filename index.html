<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Letter Me</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f7f4f0;
      --surface: #ffffff;
      --surface2: #fdf9f6;
      --border: #ede8e2;
      --border2: #e2dbd3;
      --orange: #f4632a;
      --orange2: #ff8c5a;
      --coral: #ff6b6b;
      --rose: #ff9a7b;
      --grad: linear-gradient(135deg, #f4632a 0%, #ff8c5a 40%, #ffb347 100%);
      --grad2: linear-gradient(135deg, #ff6b6b 0%, #f4632a 50%, #ff9a00 100%);
      --text: #1a1510;
      --text-muted: #a0968c;
      --text-dim: #6b6055;
      --danger: #e53e3e;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --shadow: 0 2px 16px rgba(244,99,42,0.10);
      --shadow-lg: 0 8px 40px rgba(244,99,42,0.15);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── VISTAS ── */
    .view { display: none; }
    #auth-view {
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    #auth-view.active { display: flex; }
    #app-view.active  { display: block; }

    /* Fondo decorativo auth */
    #auth-view::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: var(--grad);
      border-radius: 50%;
      top: -200px; right: -200px;
      opacity: 0.12;
      filter: blur(60px);
      pointer-events: none;
    }
    #auth-view::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: var(--grad2);
      border-radius: 50%;
      bottom: -150px; left: -100px;
      opacity: 0.10;
      filter: blur(50px);
      pointer-events: none;
    }

    /* ── AUTH ── */
    .auth-container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .auth-logo h1 {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-logo p {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .auth-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }

    .auth-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
      gap: 4px;
    }
    .auth-tab {
      flex: 1;
      padding: 0.6rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 7px;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: var(--surface);
      color: var(--orange);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-weight: 600;
    }

    .auth-form { display: none; flex-direction: column; gap: 1rem; }
    .auth-form.active { display: flex; }

    .field-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    textarea {
      background: var(--bg);
      border: 1.5px solid var(--border2);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    input:focus, textarea:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(244,99,42,0.10);
    }

    /* ── BOTONES ── */
    .btn {
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--grad);
      color: #fff;
      box-shadow: 0 4px 14px rgba(244,99,42,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(244,99,42,0.45);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost {
      background: transparent;
      border: 1.5px solid var(--border2);
      color: var(--text-dim);
      font-size: 0.85rem;
    }
    .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
    .btn-danger {
      background: transparent;
      border: 1.5px solid var(--danger);
      color: var(--danger);
      font-size: 0.85rem;
    }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    /* ── ERRORES ── */
    .error-msg {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--danger);
      padding: 0.6rem 0.75rem;
      background: rgba(229,62,62,0.06);
      border-radius: 8px;
      border-left: 3px solid var(--danger);
      display: none;
    }
    .error-msg.show { display: block; }

    /* ── HEADER ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(247,244,240,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .header-logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .user-badge {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .user-badge span {
      color: var(--orange);
      font-weight: 500;
    }

    /* ── LAYOUT ── */
    .app-layout { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── COMPOSER ── */
    .composer {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }
    .composer-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--orange);
      margin-bottom: 1rem;
      letter-spacing: -0.2px;
    }
    .composer-dot {
      width: 8px; height: 8px;
      background: var(--grad);
      border-radius: 50%;
      display: inline-block;
    }
    .composer input[type="text"] {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      background: var(--bg);
      border-radius: 10px;
      margin-bottom: 0.75rem;
      letter-spacing: -0.3px;
    }
    .composer textarea {
      background: var(--bg);
      border-radius: 10px;
      resize: vertical;
      min-height: 90px;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .composer-footer { display: flex; justify-content: flex-end; }

    /* ── FEED LABEL ── */
    .feed-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .feed-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── CARDS ── */
    .post-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .post-card:hover {
      border-color: var(--orange2);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .post-meta { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.6rem; }

    .post-alias {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      color: #fff;
      background: var(--grad);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }

    .post-date {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .post-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
      line-height: 1.3;
      letter-spacing: -0.3px;
    }
    .post-body {
      color: var(--text-dim);
      font-size: 0.92rem;
      line-height: 1.7;
      margin-bottom: 1.1rem;
      white-space: pre-wrap;
    }
    .post-footer { display: flex; align-items: center; justify-content: space-between; }

    .push-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border: 1.5px solid var(--border2);
      border-radius: 20px;
      padding: 0.4rem 1rem;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .push-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: rgba(244,99,42,0.05);
    }
    .push-btn.pushed {
      background: linear-gradient(135deg,rgba(244,99,42,0.12),rgba(255,140,90,0.12));
      border-color: var(--orange);
      color: var(--orange);
    }
    .push-arrow { font-size: 1rem; line-height: 1; }

    .edit-btn {
      background: none;
      border: 1.5px solid var(--border2);
      border-radius: 8px;
      padding: 0.3rem 0.75rem;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .edit-btn:hover { border-color: var(--orange); color: var(--orange); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,21,16,0.45);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: var(--shadow-lg);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }

    /* ── EMPTY / LOADING ── */
    .empty-state { text-align: center; padding: 4rem 2rem; }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-muted); }

    .loading {
      text-align: center;
      padding: 2rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--text);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      color: #fff;
      z-index: 999;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    #toast::before { content: '✦'; color: var(--orange2); }
    #toast.show { transform: translateY(0); opacity: 1; }

    @media(max-width:480px){
      .app-header { padding: 0 1rem; }
      .app-layout { padding: 1rem; }
      .auth-logo h1 { font-size: 2.8rem; }
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-view" class="view">
  <div class="auth-container">
    <div class="auth-logo">
      <h1>Letter Me</h1>
      <p>Write · Share · Push ideas</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Ingresar</button>
        <button class="auth-tab" onclick="switchTab('register')">Crear cuenta</button>
      </div>
      <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
        <div class="field-group">
          <label>Correo electrónico</label>
          <input type="email" id="login-email" placeholder="tu@correo.com" required />
        </div>
        <div class="field-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <div class="error-msg" id="login-error"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.25rem">Ingresar</button>
      </form>
      <form class="auth-form" id="register-form" onsubmit="handleRegister(event)">
        <div class="field-group">
          <label>Alias (nombre público)</label>
          <input type="text" id="reg-alias" placeholder="tu_alias" required minlength="3" />
        </div>
        <div class="field-group">
          <label>Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tu@correo.com" required />
        </div>
        <div class="field-group">
          <label>Contraseña</label>
          <input type="password" id="reg-password" placeholder="mínimo 6 caracteres" required minlength="6" />
        </div>
        <div class="error-msg" id="register-error"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.25rem">Crear cuenta</button>
      </form>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-view" class="view">
  <header class="app-header">
    <div class="header-logo">Letter Me</div>
    <div class="header-right">
      <div class="user-badge">Hola, <span id="header-alias">—</span></div>
      <button class="btn btn-ghost" onclick="handleLogout()">Salir</button>
    </div>
  </header>
  <main class="app-layout">
    <div class="composer">
      <div class="composer-header">
        <span class="composer-dot"></span> Nuevo artículo
      </div>
      <input type="text" id="post-title" placeholder="Título del artículo..." />
      <textarea id="post-body" placeholder="Escribe tu artículo aquí..."></textarea>
      <div class="composer-footer">
        <button class="btn btn-primary" onclick="publishPost()">Publicar →</button>
      </div>
    </div>
    <div class="feed-label">Recientes</div>
    <div id="feed"><div class="loading">Cargando artículos...</div></div>
  </main>
</div>

<!-- MODAL EDICIÓN -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">Editar artículo</div>
    <input type="text" id="edit-title" placeholder="Título..." />
    <textarea id="edit-body" placeholder="Contenido..." style="min-height:150px;resize:vertical;"></textarea>
    <div class="modal-actions">
      <button class="btn btn-danger"  onclick="deletePost()">Eliminar</button>
      <button class="btn btn-ghost"   onclick="closeEditModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://ykijutktwofzzglhdses.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlraWp1dGt0d29menpnbGhkc2VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTc3MjksImV4cCI6MjA4ODczMzcyOX0.Qz4iKwhmmoMuev34STFklSg-Aoult9yIFZ-y9U3y3LU';

  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser  = null;
  let currentAlias = null;
  let editingPostId = null;

  sb.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      currentUser = session.user;
      const { data } = await sb.from('profiles').select('alias').eq('id', currentUser.id).single();
      currentAlias = data?.alias || 'Anónimo';
      document.getElementById('header-alias').textContent = currentAlias;
      showView('app');
      loadFeed();
    } else {
      currentUser = null;
      currentAlias = null;
      showView('auth');
    }
  });

  window.handleRegister = async function(e) {
    e.preventDefault();
    const alias    = document.getElementById('reg-alias').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const errEl    = document.getElementById('register-error');
    errEl.classList.remove('show');
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) { errEl.textContent = translateError(error.message); errEl.classList.add('show'); return; }
    const { error: pe } = await sb.from('profiles').insert({ id: data.user.id, alias });
    if (pe) { errEl.textContent = 'Error al guardar alias: ' + pe.message; errEl.classList.add('show'); return; }
    showToast('¡Bienvenido a Letter Me!');
  };

  window.handleLogin = async function(e) {
    e.preventDefault();
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    errEl.classList.remove('show');
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { errEl.textContent = translateError(error.message); errEl.classList.add('show'); }
  };

  window.handleLogout = () => sb.auth.signOut();

  window.publishPost = async function() {
    const title = document.getElementById('post-title').value.trim();
    const body  = document.getElementById('post-body').value.trim();
    if (!title || !body) { showToast('Título y contenido requeridos'); return; }
    const { error } = await sb.from('posts').insert({ user_id: currentUser.id, alias: currentAlias, title, body });
    if (error) { showToast('Error: ' + error.message); return; }
    document.getElementById('post-title').value = '';
    document.getElementById('post-body').value  = '';
    showToast('¡Artículo publicado!');
    loadFeed();
  };

  async function loadFeed() {
    const feedEl = document.getElementById('feed');
    feedEl.innerHTML = '<div class="loading">Cargando artículos...</div>';
    const { data: posts, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
    if (error) { feedEl.innerHTML = '<div class="loading">Error al cargar.</div>'; return; }
    if (!posts?.length) {
      feedEl.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><p>Aún no hay artículos. ¡Sé el primero!</p></div>`;
      return;
    }
    const { data: myPushs } = await sb.from('pushs').select('post_id').eq('user_id', currentUser.id);
    const mySet = new Set((myPushs||[]).map(p => p.post_id));
    const { data: allPushs } = await sb.from('pushs').select('post_id');
    const countMap = {};
    (allPushs||[]).forEach(p => { countMap[p.post_id] = (countMap[p.post_id]||0) + 1; });

    feedEl.innerHTML = '';
    posts.forEach(post => {
      const isOwner   = post.user_id === currentUser.id;
      const hasPushed = mySet.has(post.id);
      const pushCount = countMap[post.id] || 0;
      const fecha     = new Date(post.created_at).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
      const card = document.createElement('div');
      card.className = 'post-card';
      card.innerHTML = `
        <div class="post-meta">
          <span class="post-alias">@${esc(post.alias)}</span>
          <span class="post-date">${fecha}</span>
        </div>
        <div class="post-title">${esc(post.title)}</div>
        <div class="post-body">${esc(post.body)}</div>
        <div class="post-footer">
          <button class="push-btn ${hasPushed?'pushed':''}" onclick="togglePush('${post.id}',${hasPushed})">
            <span class="push-arrow">↑</span>
            <span>${pushCount} Push${pushCount!==1?'s':''}</span>
          </button>
          <div>${isOwner?`<button class="edit-btn" onclick="openEditModal('${post.id}',\`${escA(post.title)}\`,\`${escA(post.body)}\`)">✏ Editar</button>`:''}</div>
        </div>`;
      feedEl.appendChild(card);
    });
  }

  window.togglePush = async function(postId, hasPushed) {
    if (hasPushed) {
      await sb.from('pushs').delete().eq('post_id', postId).eq('user_id', currentUser.id);
    } else {
      await sb.from('pushs').insert({ post_id: postId, user_id: currentUser.id });
    }
    loadFeed();
  };

  window.openEditModal = function(id, title, body) {
    editingPostId = id;
    document.getElementById('edit-title').value = title;
    document.getElementById('edit-body').value  = body;
    document.getElementById('edit-modal').classList.add('show');
  };
  window.closeEditModal = function() {
    editingPostId = null;
    document.getElementById('edit-modal').classList.remove('show');
  };
  window.saveEdit = async function() {
    if (!editingPostId) return;
    const title = document.getElementById('edit-title').value.trim();
    const body  = document.getElementById('edit-body').value.trim();
    if (!title || !body) { showToast('Campos requeridos'); return; }
    const { error } = await sb.from('posts').update({ title, body }).eq('id', editingPostId).eq('user_id', currentUser.id);
    if (error) { showToast('Error: ' + error.message); return; }
    closeEditModal(); showToast('Artículo actualizado ✓'); loadFeed();
  };
  window.deletePost = async function() {
    if (!editingPostId || !confirm('¿Eliminar este artículo?')) return;
    const { error } = await sb.from('posts').delete().eq('id', editingPostId).eq('user_id', currentUser.id);
    if (error) { showToast('Error: ' + error.message); return; }
    closeEditModal(); showToast('Artículo eliminado'); loadFeed();
  };

  function showView(name) {
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById(`${name}-view`).classList.add('active');
  }
  window.switchTab = function(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
    document.querySelectorAll('.auth-form').forEach((f,i)=>f.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  };
  function showToast(msg) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
  }
  window.showToast = showToast;
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function escA(s){return String(s).replace(/`/g,'\\`').replace(/\$/g,'\\$')}
  function translateError(msg) {
    if(msg.includes('already registered')||msg.includes('already been registered')) return 'Este correo ya está registrado.';
    if(msg.includes('Invalid login credentials')) return 'Correo o contraseña incorrectos.';
    if(msg.includes('Password should be at least')) return 'La contraseña debe tener al menos 6 caracteres.';
    if(msg.includes('Email not confirmed')) return 'Confirmá tu email antes de ingresar (revisá tu casilla).';
    return msg;
  }
</script>
</body>
</html>
